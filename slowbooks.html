<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no,maximum-scale=1">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Slowbooks">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#c8102e">
<link id="pwa-manifest" rel="manifest">
<title>Slowbooks</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#111;--sf:#1c1c1c;--sf2:#252525;
  --ac:#c8102e;--ach:#a50c25;
  --tx:#efefef;--tx2:#888;--bd:#2e2e2e;
  --green:#2ecc71;--yellow:#f0a500;--red:#e74c3c;
  --r:8px
}
html{-webkit-text-size-adjust:100%;color-scheme:dark}
body{
  background:var(--bg);color:var(--tx);
  font:15px/1.5 system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  max-width:600px;margin:0 auto;
  min-height:100dvh;
  padding-bottom:calc(env(safe-area-inset-bottom,0px) + 68px);
  overscroll-behavior-y:none
}
/* ── header ─────────────────────────── */
#hdr{
  position:sticky;top:0;z-index:50;
  background:var(--sf);border-bottom:1px solid var(--bd);
  padding:11px 16px;
  padding-top:calc(11px + env(safe-area-inset-top,0px));
  display:flex;justify-content:space-between;align-items:center
}
#logo{font:bold 15px/1 Georgia,serif;letter-spacing:3px;color:var(--ac)}
#hdr-r{display:flex;align-items:center;gap:6px}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block;vertical-align:middle;background:var(--bd);transition:background .3s}
.dot.ok{background:var(--green)}
.dot.err{background:var(--red)}
.dot.syncing{background:var(--yellow);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.2}}
.hdr-btn{
  background:transparent;border:none;color:var(--tx2);
  font-size:18px;padding:6px 10px;cursor:pointer;
  border-radius:var(--r);touch-action:manipulation;line-height:1
}
.hdr-btn:active{background:var(--sf2)}
/* ── bottom nav ─────────────────────── */
#bottom-nav{
  position:fixed;
  bottom:0;left:0;right:0;
  max-width:600px;margin:0 auto;
  background:var(--sf);
  border-top:1px solid var(--bd);
  display:flex;
  padding-bottom:env(safe-area-inset-bottom,0px);
  z-index:50
}
.nav-btn{
  flex:1;background:transparent;border:none;
  color:var(--tx2);font-size:10px;
  padding:10px 4px 8px;
  display:flex;flex-direction:column;
  align-items:center;gap:3px;
  cursor:pointer;touch-action:manipulation;
  transition:color .15s
}
.nav-btn svg{width:22px;height:22px}
.nav-btn.active{color:var(--ac)}
.nav-btn:active{opacity:.7}
/* ── main ───────────────────────────── */
#root{padding:12px 16px}
/* ── toolbar ────────────────────────── */
.toolbar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
.toolbar select,.toolbar input[type=month]{
  flex:1;min-width:110px;
  background:var(--sf);color:var(--tx);
  border:1px solid var(--bd);border-radius:var(--r);
  padding:8px 10px;font:14px/1 system-ui,sans-serif;
  -webkit-appearance:none;appearance:none
}
/* ── summary bar ────────────────────── */
.summary{
  display:flex;justify-content:space-between;align-items:baseline;
  font-size:13px;color:var(--tx2);margin-bottom:10px
}
.sum-total{color:var(--ac);font-weight:700}
.sum-tax{color:var(--tx2);font-weight:400;font-size:12px}
/* ── cards ──────────────────────────── */
#card-list{display:flex;flex-direction:column;gap:10px}
.card{
  background:var(--sf);border:1px solid var(--bd);
  border-radius:var(--r);display:flex;gap:10px;padding:10px
}
.thumb{width:64px;height:64px;border-radius:6px;object-fit:cover;flex-shrink:0}
.thumb-empty{
  width:64px;height:64px;background:var(--sf2);
  border-radius:6px;display:flex;align-items:center;
  justify-content:center;font-size:22px;flex-shrink:0;color:var(--tx2)
}
.card-body{flex:1;min-width:0}
.card-r1{
  display:flex;justify-content:space-between;
  align-items:baseline;gap:6px;margin-bottom:4px
}
.card-merchant{font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.card-amt{color:var(--ac);font-weight:700;white-space:nowrap;font-size:16px}
.card-tags{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:4px}
.tag{
  font-size:11px;background:var(--sf2);
  border-radius:4px;padding:2px 7px;color:var(--tx2)
}
.card-date{font-size:12px;color:var(--tx2)}
.card-notes{
  font-size:12px;color:var(--tx2);margin-top:3px;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap
}
.card-acts{display:flex;flex-direction:column;gap:4px;flex-shrink:0}
.icon-btn{
  background:transparent;border:none;
  padding:5px 8px;cursor:pointer;border-radius:4px;font-size:15px;line-height:1
}
.icon-btn:active{background:var(--sf2)}
.icon-btn.del:active{background:rgba(231,76,60,.2)}
.empty{
  text-align:center;color:var(--tx2);
  padding:64px 24px;font-size:14px;line-height:2
}
/* ── FAB ────────────────────────────── */
.fab{
  position:fixed;
  bottom:calc(76px + env(safe-area-inset-bottom,0px));
  right:20px;width:56px;height:56px;border-radius:50%;
  background:var(--ac);color:#fff;font-size:28px;border:none;
  cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,.45);
  display:flex;align-items:center;justify-content:center;
  z-index:40;touch-action:manipulation;line-height:1
}
.fab:active{transform:scale(.93)}
/* ── form ───────────────────────────── */
.form-wrap{padding-bottom:32px}
.form-title{font-size:18px;font-weight:700;margin-bottom:16px;letter-spacing:.3px}
.photo-row{display:flex;gap:12px;margin-bottom:14px;align-items:flex-start}
.photo-box{
  width:96px;height:96px;flex-shrink:0;
  background:var(--sf);border:1px solid var(--bd);
  border-radius:var(--r);display:flex;align-items:center;
  justify-content:center;overflow:hidden
}
.photo-ph{text-align:center;font-size:26px;color:var(--tx2);line-height:1.6}
.photo-ph small{font-size:11px;display:block}
.photo-full{width:100%;height:100%;object-fit:cover}
.photo-btns{display:flex;flex-direction:column;gap:7px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.fg{display:flex;flex-direction:column;gap:5px;margin-bottom:12px}
.fg>label{font-size:13px;color:var(--tx2);font-weight:500}
input[type=text],input[type=number],input[type=date],select,textarea{
  background:var(--sf);color:var(--tx);
  border:1px solid var(--bd);border-radius:var(--r);
  padding:10px 12px;font:15px/1.4 system-ui,sans-serif;
  width:100%;-webkit-appearance:none;appearance:none
}
input[type=month]{
  background:var(--sf);color:var(--tx);
  border:1px solid var(--bd);border-radius:var(--r);
  padding:8px 10px;font:14px/1 system-ui,sans-serif;
  -webkit-appearance:none;appearance:none
}
input:focus,select:focus,textarea:focus{
  outline:2px solid var(--ac);border-color:transparent
}
textarea{resize:vertical;min-height:72px}
select{cursor:pointer}
.form-btns{display:flex;gap:10px;margin-top:20px;flex-wrap:wrap}
/* ── settings ───────────────────────── */
.settings-wrap{padding-bottom:32px}
.s-card{
  background:var(--sf);border:1px solid var(--bd);
  border-radius:var(--r);padding:16px;margin-bottom:14px
}
.s-card h3{font-size:15px;margin-bottom:8px}
.s-row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-top:12px}
.setup-details{margin:10px 0}
.setup-details summary{font-size:13px;color:var(--tx2);cursor:pointer;user-select:none}
.setup-details ol{
  margin:10px 0 0 20px;
  font-size:13px;color:var(--tx2);line-height:1.9
}
.setup-details a{color:var(--ac)}
.code-block{
  display:block;background:var(--sf2);border-radius:4px;
  padding:6px 10px;margin:4px 0;
  font:12px/1.5 monospace;word-break:break-all;color:var(--tx)
}
/* ── buttons ────────────────────────── */
.btn-primary{
  background:var(--ac);color:#fff;border:none;
  border-radius:var(--r);padding:12px 22px;
  font:600 15px system-ui,sans-serif;
  cursor:pointer;touch-action:manipulation
}
.btn-primary:active{background:var(--ach)}
.btn-secondary{
  background:var(--sf2);color:var(--tx);
  border:1px solid var(--bd);border-radius:var(--r);
  padding:10px 16px;font:14px system-ui,sans-serif;cursor:pointer
}
.btn-secondary:active{background:var(--bd)}
.btn-ghost{
  background:transparent;color:var(--tx2);
  border:1px solid var(--bd);border-radius:var(--r);
  padding:8px 14px;font:13px system-ui,sans-serif;cursor:pointer
}
.btn-ghost:active{background:var(--sf)}
.btn-ghost.sm{padding:6px 10px;font-size:12px}
.btn-danger{
  background:transparent;color:var(--red);
  border:1px solid rgba(231,76,60,.5);border-radius:var(--r);
  padding:9px 14px;font:14px system-ui,sans-serif;cursor:pointer
}
.btn-danger:active{background:rgba(231,76,60,.1)}
.btn-sm{
  background:var(--sf2);color:var(--tx);
  border:1px solid var(--bd);border-radius:var(--r);
  padding:8px 12px;font:13px system-ui,sans-serif;
  cursor:pointer;white-space:nowrap;
  display:inline-flex;align-items:center;gap:4px;
  touch-action:manipulation
}
.btn-sm:active{background:var(--bd)}
.btn-xs{
  background:var(--sf2);color:var(--tx2);
  border:1px solid var(--bd);border-radius:4px;
  padding:3px 8px;font:12px system-ui,sans-serif;cursor:pointer
}
/* ── toast ──────────────────────────── */
#toast{
  position:fixed;
  bottom:calc(76px + env(safe-area-inset-bottom,0px));
  left:50%;transform:translateX(-50%) translateY(6px);
  background:var(--sf2);color:var(--tx);
  border:1px solid var(--bd);border-radius:20px;
  padding:10px 20px;font-size:14px;white-space:nowrap;
  opacity:0;transition:opacity .18s,transform .18s;
  pointer-events:none;z-index:200
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#toast.ok{border-color:var(--green);color:var(--green)}
#toast.warn{border-color:var(--yellow);color:var(--yellow)}
#toast.err{border-color:var(--red);color:var(--red)}
/* ── sync modal ─────────────────────── */
#sync-modal{
  position:fixed;inset:0;z-index:300;
  background:rgba(0,0,0,.6);
  display:flex;align-items:center;justify-content:center
}
#sync-modal-box{
  background:var(--sf);border:1px solid var(--bd);
  border-radius:var(--r);padding:28px 24px;
  width:min(320px,90vw);text-align:center;
  display:flex;flex-direction:column;gap:14px
}
#sync-modal-title{font-size:17px;font-weight:700}
#sync-modal-status{color:var(--tx2);font-size:14px;min-height:40px}
/* ── ghost text ─────────────────────── */
.ghost-wrap{position:relative}
.ghost-input{background:transparent;position:relative;z-index:1}
.ghost-hint{
  position:absolute;left:12px;top:50%;transform:translateY(-50%);
  color:var(--tx2);opacity:.45;pointer-events:none;
  font:15px/1.4 system-ui,sans-serif;white-space:nowrap;
  overflow:hidden;z-index:0
}
/* ── overview ───────────────────────── */
.ov-card{
  background:var(--sf);border:1px solid var(--bd);
  border-radius:var(--r);padding:16px;margin-bottom:14px
}
.ov-card h3{font-size:14px;color:var(--tx2);margin-bottom:10px;text-transform:uppercase;letter-spacing:.5px}
.ov-row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px;font-size:14px}
.ov-val{font-weight:700;color:var(--tx)}
.ov-odo{
  font-size:14px;color:var(--tx2);margin-bottom:14px;
  cursor:pointer;display:inline-flex;align-items:center;gap:6px
}
.ov-odo span{color:var(--tx)}
.pie-legend{display:flex;flex-direction:column;gap:6px;margin-top:12px}
.pie-legend-row{display:flex;align-items:center;gap:8px;font-size:13px}
.pie-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.pie-label{flex:1;color:var(--tx2)}
.pie-amt{font-weight:600}
.pie-pct{color:var(--tx2);font-size:12px}
/* ── travel ─────────────────────────── */
.active-trip-card{
  background:var(--sf);border:2px solid var(--red);
  border-radius:var(--r);padding:16px;margin-bottom:14px;
  display:flex;align-items:center;gap:12px
}
.pulse-dot{
  width:10px;height:10px;border-radius:50%;background:var(--red);
  animation:pulse 1s infinite;flex-shrink:0
}
.active-trip-info{flex:1}
.active-trip-info strong{display:block;font-size:15px}
.active-trip-info span{font-size:13px;color:var(--tx2)}
.trip-card{
  background:var(--sf);border:1px solid var(--bd);
  border-radius:var(--r);padding:12px;margin-bottom:10px;
  display:flex;justify-content:space-between;align-items:flex-start
}
.trip-body{flex:1;min-width:0}
.trip-r1{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px}
.trip-km{font-weight:700;color:var(--ac);font-size:16px}
.trip-purpose{font-size:14px;font-weight:600;margin-bottom:2px}
.trip-writeoff{font-size:13px;color:var(--green)}
.trip-route{font-size:12px;color:var(--tx2);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.trip-date{font-size:12px;color:var(--tx2)}
/* ── toggle ─────────────────────────── */
.toggle-label{display:flex;align-items:center;justify-content:space-between;width:100%;cursor:pointer;font-size:14px}
.toggle-label input[type=checkbox]{width:40px;height:24px;-webkit-appearance:none;appearance:none;background:var(--bd);border-radius:12px;position:relative;cursor:pointer;transition:background .2s;flex-shrink:0}
.toggle-label input[type=checkbox]::after{content:'';position:absolute;width:18px;height:18px;border-radius:50%;background:#fff;top:3px;left:3px;transition:left .2s}
.toggle-label input[type=checkbox]:checked{background:var(--ac)}
.toggle-label input[type=checkbox]:checked::after{left:19px}
/* ── misc ───────────────────────────── */
a{color:var(--ac)}
details>summary{list-style:none}
details>summary::-webkit-details-marker{display:none}
.sm{font-size:13px}
.muted{color:var(--tx2)}
.mt8{margin-top:8px}
.batch-preview{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
.batch-thumb{width:60px;height:60px;border-radius:6px;object-fit:cover;border:1px solid var(--bd)}
.writeoff-display{
  background:var(--sf2);border-radius:var(--r);padding:10px 12px;
  font-size:14px;color:var(--green);border:1px solid var(--bd)
}
</style>
</head>
<body>
 
<div id="app">
  <header id="hdr">
    <span id="logo">SLOWBOOKS</span>
    <div id="hdr-r">
      <span id="sync-dot" class="dot" title=""></span>
      <button class="hdr-btn" id="btn-sync" title="Sync to Drive">&#9729;</button>
    </div>
  </header>
  <div id="root"></div>
</div>
 
<nav id="bottom-nav">
  <button class="nav-btn active" data-tab="receipts">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/>
      <rect x="9" y="3" width="6" height="4" rx="1"/>
      <line x1="9" y1="12" x2="15" y2="12"/><line x1="9" y1="16" x2="13" y2="16"/>
    </svg>
    <span>Receipts</span>
  </button>
  <button class="nav-btn" data-tab="travel">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M5 17H3a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v5"/>
      <circle cx="15.5" cy="17.5" r="2.5"/><circle cx="4.5" cy="17.5" r="2.5"/>
      <path d="M3 9h11m-3-6v6"/>
    </svg>
    <span>Travel</span>
  </button>
  <button class="nav-btn" data-tab="overview">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/>
      <line x1="6" y1="20" x2="6" y2="14"/><line x1="2" y1="20" x2="22" y2="20"/>
    </svg>
    <span>Overview</span>
  </button>
  <button class="nav-btn" data-tab="settings">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="3"/>
      <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
    </svg>
    <span>Settings</span>
  </button>
</nav>
 
<div id="toast" role="status" aria-live="polite"></div>
 
<script>
'use strict';
/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   SLOWBOOKS  v2.1 — offline-first PWA
   Receipt tracker + mileage log
   Storage: IndexedDB   Sync: Google Drive OAuth2
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
 
// ─── CONSTANTS ──────────────────────────────
const VER         = '2.1';
const CATS        = ['Ink & Supplies','Equipment','Studio Rent','Marketing','Travel','Misc'];
const PMTS        = ['Cash','Debit Card','Credit Card','Venmo','Zelle','Apple Pay','Check','Other'];
const CRA_DEFAULT = 0.70;
const DRIVE_FILE  = 'slowbooks_data.json';
const DRIVE_SCOPE = 'https://www.googleapis.com/auth/drive.file';
const PIE_COLORS  = ['#c8102e','#e67e22','#f0a500','#2ecc71','#1abc9c','#3498db','#9b59b6','#e91e63'];
 
// ─── PWA MANIFEST ────────────────────────────
(function () {
  const icon = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512"><rect width="512" height="512" rx="80" fill="#111"/><text x="256" y="370" text-anchor="middle" font-size="340" font-family="Georgia,serif" fill="#c8102e">S</text></svg>`;
  const manifest = {
    name: 'Slowbooks', short_name: 'Slowbooks',
    description: 'Offline receipt tracker',
    start_url: location.pathname, display: 'standalone',
    orientation: 'portrait', background_color: '#111', theme_color: '#c8102e',
    icons: [{ src: 'data:image/svg+xml,' + encodeURIComponent(icon), sizes: '512x512', type: 'image/svg+xml', purpose: 'any maskable' }],
  };
  document.getElementById('pwa-manifest').href = URL.createObjectURL(new Blob([JSON.stringify(manifest)], { type: 'application/manifest+json' }));
}());
 
// ─── SERVICE WORKER ──────────────────────────
const SW_SRC = `
const CACHE = 'sb-v${VER}';
self.addEventListener('install', () => self.skipWaiting());
self.addEventListener('activate', e => {
  e.waitUntil(
    caches.keys()
      .then(ks => Promise.all(ks.filter(k => k !== CACHE).map(k => caches.delete(k))))
      .then(() => self.clients.claim())
  );
});
self.addEventListener('message', e => {
  if (e.data && e.data.type === 'CACHE_URL')
    caches.open(CACHE).then(c => c.add(e.data.url).catch(() => {}));
});
self.addEventListener('fetch', e => {
  if (e.request.method !== 'GET') return;
  e.respondWith(
    caches.match(e.request).then(hit => {
      if (hit) return hit;
      return fetch(e.request).then(res => {
        if (res.ok) {
          const clone = res.clone();
          caches.open(CACHE).then(c => c.put(e.request, clone));
        }
        return res;
      }).catch(() => caches.match(e.request));
    })
  );
});
`;

// ─── INDEXED DB ─────────────────────────────
const DB = (() => {
  let _db;
  const wrap = req => new Promise((ok, fail) => {
    req.onsuccess = e => ok(e.target.result);
    req.onerror   = e => fail(e.target.error);
  });
  return {
    open() {
      return new Promise((ok, fail) => {
        const req = indexedDB.open('slowbooks', 2);
        req.onupgradeneeded = e => {
          const db = e.target.result;
          if (e.oldVersion < 1) {
            const s = db.createObjectStore('receipts', { keyPath: 'id', autoIncrement: true });
            s.createIndex('date', 'date');
            s.createIndex('category', 'category');
            db.createObjectStore('settings', { keyPath: 'key' });
          }
          if (e.oldVersion < 2) {
            if (!db.objectStoreNames.contains('receipts')) {
              const s2 = db.createObjectStore('receipts', { keyPath: 'id', autoIncrement: true });
              s2.createIndex('date', 'date');
              s2.createIndex('category', 'category');
            }
            if (!db.objectStoreNames.contains('settings'))
              db.createObjectStore('settings', { keyPath: 'key' });
            if (!db.objectStoreNames.contains('trips')) {
              const t = db.createObjectStore('trips', { keyPath: 'id', autoIncrement: true });
              t.createIndex('date', 'date');
            }
          }
        };
        req.onsuccess = e => { _db = e.target.result; ok(); };
        req.onerror   = e => fail(e.target.error);
      });
    },
    _s(name, mode = 'readonly') { return _db.transaction(name, mode).objectStore(name); },
    all(name)       { return wrap(this._s(name).getAll()); },
    get(name, key)  { return wrap(this._s(name).get(key)); },
    put(name, obj)  { return wrap(this._s(name, 'readwrite').put(obj)); },
    del(name, key)  { return wrap(this._s(name, 'readwrite').delete(key)); },
    async getSetting(key, fb = null) {
      const r = await this.get('settings', key);
      return r != null ? r.value : fb;
    },
    setSetting(key, value) { return this.put('settings', { key, value }); },
  };
})();
 
// ─── PREDICTIVE TEXT ────────────────────────
const Predict = {
  _merchants: [], _purposes: [], _notes: [],
  async build() {
    const merchants = S.receipts.map(r => r.merchant).filter(Boolean);
    const purposes  = S.trips.map(t => t.purpose).filter(Boolean);
    const notes     = S.receipts.map(r => r.notes).filter(Boolean);
    this._merchants = [...new Set(merchants)];
    this._purposes  = [...new Set(purposes)];
    this._notes     = [...new Set(notes)];
  },
  suggest(field, typed) {
    if (!typed || typed.length < 2) return '';
    const corpus = field === 'merchant' ? this._merchants
                 : field === 'purpose'  ? this._purposes
                 : field === 'notes'    ? this._notes : [];
    const lower = typed.toLowerCase();
    const match = corpus.find(v => v.toLowerCase().startsWith(lower) && v.toLowerCase() !== lower);
    return match ? match.slice(typed.length) : '';
  },
};
 
// ─── GHOST TEXT HELPER ───────────────────────
function attachGhost(inputId, ghostId, field) {
  const inp = $(inputId);
  const ghost = $(ghostId);
  if (!inp || !ghost) return;
  inp.addEventListener('input', () => {
    const hint = Predict.suggest(field, inp.value);
    ghost.textContent = hint ? inp.value + hint : '';
  });
  inp.addEventListener('keydown', e => {
    if ((e.key === 'Tab' || e.key === 'ArrowRight') && ghost.textContent) {
      e.preventDefault();
      inp.value = ghost.textContent;
      ghost.textContent = '';
    }
  });
}
 
// ─── HAVERSINE ───────────────────────────────
function haversineKm(a, b) {
  const R = 6371;
  const dLat = (b.lat - a.lat) * Math.PI / 180;
  const dLon = (b.lng - a.lng) * Math.PI / 180;
  const x = Math.sin(dLat/2)**2 +
    Math.cos(a.lat * Math.PI/180) * Math.cos(b.lat * Math.PI/180) * Math.sin(dLon/2)**2;
  return R * 2 * Math.asin(Math.sqrt(x));
}
 
// ─── GOOGLE DRIVE ────────────────────────────
const Drive = {
  token() {
    const t = localStorage.getItem('gd_tok');
    const e = +(localStorage.getItem('gd_exp') || 0);
    return (t && Date.now() < e) ? t : null;
  },
  saveToken(tok, secs) {
    localStorage.setItem('gd_tok', tok);
    localStorage.setItem('gd_exp', Date.now() + (parseInt(secs) - 120) * 1000);
  },
  clearToken() {
    localStorage.removeItem('gd_tok');
    localStorage.removeItem('gd_exp');
  },
  checkCallback() {
    const p = new URLSearchParams(location.hash.slice(1));
    const t = p.get('access_token');
    if (!t) return false;
    this.saveToken(t, p.get('expires_in') || '3600');
    history.replaceState(null, '', location.pathname);
    return true;
  },
  async authorize() {
    const cid = await DB.getSetting('gdClientId');
    if (!cid) { toast('Add your Google Client ID in Settings first', 'warn'); return; }
    location.href = 'https://accounts.google.com/o/oauth2/v2/auth?' + new URLSearchParams({
      client_id: cid,
      redirect_uri: location.origin + location.pathname,
      response_type: 'token',
      scope: DRIVE_SCOPE,
    });
  },
  async _fetch(method, path, body, tok) {
    const hdrs = { Authorization: 'Bearer ' + tok };
    let reqBody;
    if (body && !(body instanceof FormData)) { hdrs['Content-Type'] = 'application/json'; reqBody = JSON.stringify(body); }
    else if (body) reqBody = body;
    const r = await fetch('https://www.googleapis.com' + path, { method, headers: hdrs, body: reqBody });
    if (!r.ok) throw new Error('Drive ' + r.status + ': ' + (await r.text()));
    return r.headers.get('content-type')?.includes('json') ? r.json() : r.text();
  },
  async findFile(tok) {
    const d = await this._fetch('GET',
      '/drive/v3/files?q=' + encodeURIComponent(`name='${DRIVE_FILE}' and trashed=false`) + '&fields=files(id,modifiedTime)',
      null, tok);
    return d.files?.[0] || null;
  },
  async download(tok, fid) {
    const r = await fetch('https://www.googleapis.com/drive/v3/files/' + fid + '?alt=media',
      { headers: { Authorization: 'Bearer ' + tok } });
    if (!r.ok) throw new Error('Download ' + r.status);
    return r.json();
  },
  async upload(tok, data, fid) {
    const fd = new FormData();
    fd.append('metadata', new Blob([JSON.stringify({ name: DRIVE_FILE, mimeType: 'application/json' })], { type: 'application/json' }));
    fd.append('file',     new Blob([JSON.stringify(data)], { type: 'application/json' }));
    const url = (fid
      ? 'https://www.googleapis.com/upload/drive/v3/files/' + fid + '?uploadType=multipart'
      : 'https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart');
    const r = await fetch(url, { method: fid ? 'PATCH' : 'POST', headers: { Authorization: 'Bearer ' + tok }, body: fd });
    if (!r.ok) throw new Error('Upload ' + r.status);
    return r.json();
  },
  async sync(onStatus) {
    const tok = this.token();
    if (!tok) { await this.authorize(); return; }
 
    S.syncStatus = 'syncing'; renderDot();
    onStatus && onStatus('Connecting to Google Drive…');
    try {
      for (const r of S.receipts) {
        if (!r.uid) { r.uid = mkuid(); await DB.put('receipts', r); }
      }
      for (const t of S.trips) {
        if (!t.uid) { t.uid = mkuid(); await DB.put('trips', t); }
      }
 
      onStatus && onStatus('Fetching remote data…');
      const file   = await this.findFile(tok);
      const remote = file ? await this.download(tok, file.id) : { receipts: [], trips: [] };
      const remoteReceipts = remote.receipts || [];
      const remoteTrips    = remote.trips    || [];
 
      const rMap = new Map();
      remoteReceipts.forEach(r => rMap.set(r.uid, r));
      S.receipts.forEach(r => rMap.set(r.uid, r));
      const mergedReceipts = [...rMap.values()].sort((a, b) => b.date.localeCompare(a.date));
 
      const tMap = new Map();
      remoteTrips.forEach(t => tMap.set(t.uid, t));
      S.trips.forEach(t => tMap.set(t.uid, t));
      const mergedTrips = [...tMap.values()].sort((a, b) => b.date.localeCompare(a.date));
 
      onStatus && onStatus('Uploading merged data…');
      await this.upload(tok, {
        ver: VER, at: new Date().toISOString(),
        receipts: mergedReceipts,
        trips: mergedTrips,
      }, file?.id);
 
      const localRUids = new Set(S.receipts.map(r => r.uid));
      for (const r of mergedReceipts) {
        if (!localRUids.has(r.uid)) {
          const { id: _d, ...rest } = r;
          await DB.put('receipts', rest);
        }
      }
      const localTUids = new Set(S.trips.map(t => t.uid));
      for (const t of mergedTrips) {
        if (!localTUids.has(t.uid)) {
          const { id: _d, ...rest } = t;
          await DB.put('trips', rest);
        }
      }
      await DB.setSetting('lastSync', new Date().toISOString());
 
      S.receipts = await DB.all('receipts');
      S.trips    = await DB.all('trips');
      await Predict.build();
      S.syncStatus = 'ok'; renderDot();
      const msg = `Synced — ${mergedReceipts.length} receipt${mergedReceipts.length !== 1 ? 's' : ''}, ${mergedTrips.length} trip${mergedTrips.length !== 1 ? 's' : ''}`;
      onStatus && onStatus(msg);
      return msg;
    } catch (err) {
      S.syncStatus = 'err'; renderDot();
      const msg = 'Sync failed: ' + err.message;
      onStatus && onStatus(msg);
      throw err;
    }
  },
};
 
// ─── IMAGE ───────────────────────────────────
const Img = {
  compress(file, maxPx = 800, q = 0.78) {
    return new Promise(ok => {
      const fr = new FileReader();
      fr.onload = e => {
        const img = new Image();
        img.onload = () => {
          let { width: w, height: h } = img;
          if (w > maxPx || h > maxPx) {
            if (w > h) { h = Math.round(h * maxPx / w); w = maxPx; }
            else       { w = Math.round(w * maxPx / h); h = maxPx; }
          }
          const c = document.createElement('canvas');
          c.width = w; c.height = h;
          c.getContext('2d').drawImage(img, 0, 0, w, h);
          ok(c.toDataURL('image/jpeg', q));
        };
        img.src = e.target.result;
      };
      fr.readAsDataURL(file);
    });
  },
};

    download: 'slowbooks_receipts_' + new Date().toISOString().slice(0, 10) + '.csv',
  });

async function scanReceiptOCR(dataUrl) {
  const apiKey = await DB.getSetting('anthropicKey', '');
  if (!apiKey) return; // silently skip if no key set
 
  // Show scanning indicator
  const box = $('photo-box');
  if (box) {
    const overlay = document.createElement('div');
    overlay.id = 'scan-overlay';
    overlay.style.cssText = 'position:absolute;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;border-radius:8px;font-size:11px;color:#fff;flex-direction:column;gap:4px;z-index:10';
    overlay.innerHTML = '<span style="font-size:20px">🔍</span><span>Scanning…</span>';
    box.style.position = 'relative';
    box.appendChild(overlay);
  }
 
  try {
    const base64 = dataUrl.split(',')[1];
    const mediaType = dataUrl.split(';')[0].split(':')[1] || 'image/jpeg';
 
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true',
      },
      body: JSON.stringify({
        model: 'claude-opus-4-5',
        max_tokens: 512,
        messages: [{
          role: 'user',
          content: [
            {
              type: 'image',
              source: { type: 'base64', media_type: mediaType, data: base64 },
            },
            {
              type: 'text',
              text: `Extract receipt data from this image. Respond ONLY with a valid JSON object, no markdown, no explanation. Use this exact structure:
{"merchant":"","date":"","amount":0,"taxAmount":0,"category":"","paymentMethod":"","notes":""}
 
Rules:
- date: YYYY-MM-DD format, today if not visible
- amount: total amount as number (no $ sign)
- taxAmount: tax/HST/GST as number, 0 if not visible
- category: one of [Ink & Supplies, Equipment, Studio Rent, Marketing, Travel, Misc]
- paymentMethod: one of [Cash, Debit Card, Credit Card, Venmo, Zelle, Apple Pay, Check, Other]
- notes: any useful info like receipt number or items purchased (max 80 chars)
- If a field is not visible, use empty string or 0`
            }
          ]
        }]
      })
    });
 
    const data = await response.json();
    const text = data.content?.[0]?.text || '';
 
    let parsed;
    try {
      parsed = JSON.parse(text.replace(/```json|```/g, '').trim());
    } catch {
      throw new Error('Could not parse response');
    }
 
    // Fill in fields
    if (parsed.merchant && $('f-merchant')) $('f-merchant').value = parsed.merchant;
    if (parsed.date     && $('f-date'))     $('f-date').value     = parsed.date;
    if (parsed.amount   && $('f-amount'))   $('f-amount').value   = parsed.amount;
    if (parsed.taxAmount && $('f-tax'))     $('f-tax').value      = parsed.taxAmount;
    if (parsed.notes    && $('f-notes'))    $('f-notes').value    = parsed.notes;
 
    // Category
    if (parsed.category && $('f-cat')) {
      const catEl = $('f-cat');
      const match = [...catEl.options].find(o => o.value === parsed.category);
      if (match) catEl.value = parsed.category;
    }
 
    // Payment method
    if (parsed.paymentMethod && $('f-pm')) {
      const pmEl = $('f-pm');
      const match = [...pmEl.options].find(o => o.value === parsed.paymentMethod);
      if (match) pmEl.value = parsed.paymentMethod;
    }
 
    toast('Receipt scanned ✓', 'ok');
  } catch (err) {
    toast('Scan failed — fill in manually', 'warn');
  } finally {
    document.getElementById('scan-overlay')?.remove();
  }
}

  S.activeTrip = {

  };
  if (gpsEnabled && navigator.geolocation) {
    S.activeTrip.watchId = navigator.geolocation.watchPosition(
      pos => { S.activeTrip.startCoords = { lat: pos.coords.latitude, lng: pos.coords.longitude }; },
      () => toast('GPS unavailable', 'warn'),
      { enableHighAccuracy: true, maximumAge: 5000 }
    );
  }
  await DB.setSetting('activeTrip', S.activeTrip);
  renderTravel();
}
 
async function endTrip() {
  if (!S.activeTrip) return;
  if (S.activeTrip.watchId != null) {
    navigator.geolocation.clearWatch(S.activeTrip.watchId);
  }
 
  const getEndCoords = () => new Promise(resolve => {
    if (!navigator.geolocation) { resolve(null); return; }
    navigator.geolocation.getCurrentPosition(
      pos => resolve({ lat: pos.coords.latitude, lng: pos.coords.longitude }),
      () => resolve(null),
      { enableHighAccuracy: true, timeout: 8000 }
    );
  });
 
  const endCoords = await getEndCoords();
  let km = 0;
  let gpsUsed = false;
  if (S.activeTrip.startCoords && endCoords) {
    km = haversineKm(S.activeTrip.startCoords, endCoords);
    gpsUsed = true;
  }
 
  const tripData = {
    startCoords: S.activeTrip.startCoords,
    endCoords,
    km,
    gpsUsed,
    startTime: S.activeTrip.startTime,
  };
 
  S.activeTrip = null;
  await DB.setSetting('activeTrip', null);
 
  openTripForm(null, tripData);
}

  // Pie chart
  if (catData.length > 0) {
    drawPieChart('pie-chart', catData);
    const legend = $('pie-legend');
    const totalVal = catData.reduce((s, d) => s + d.value, 0);
    legend.innerHTML = catData.map(d => `
      <div class="pie-legend-row">
        <div class="pie-dot" style="background:${d.color}"></div>
        <span class="pie-label">${esc(d.label)}</span>
        <span class="pie-amt">$${d.value.toFixed(2)}</span>
        <span class="pie-pct">${totalVal > 0 ? ((d.value / totalVal) * 100).toFixed(1) : 0}%</span>
      </div>`).join('');
  }
}
 
function drawPieChart(canvasId, data) {
  const canvas = $(canvasId);
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const total = data.reduce((s, d) => s + d.value, 0);
  if (total === 0) return;
  let angle = -Math.PI / 2;
  data.forEach(d => {
    const slice = (d.value / total) * 2 * Math.PI;
    ctx.beginPath();
    ctx.moveTo(canvas.width/2, canvas.height/2);
    ctx.arc(canvas.width/2, canvas.height/2, canvas.width/2 - 4, angle, angle + slice);
    ctx.closePath();
    ctx.fillStyle = d.color;
    ctx.fill();
    angle += slice;
  });
}

          <summary>&#9654; Setup instructions</summary>
          <ol>
            <li>Open <a href="https://console.cloud.google.com/apis/credentials" target="_blank" rel="noopener">Google Cloud Console &rarr; Credentials</a></li>

    S.trips    = [];

// ─── INIT ────────────────────────────────────
async function init() {
  if (Drive.checkCallback()) {
    S.syncStatus = 'ok'; renderDot();
    toast('Google Drive connected', 'ok');
  }
 
  await DB.open();
 
  S.receipts = await DB.all('receipts');
  S.trips    = await DB.all('trips');
 
  await Predict.build();
 
  // Odometer first-launch / yearly prompt
  const odo = await DB.getSetting('odometer');
  if (odo == null) {
    const base = prompt('Welcome to Slowbooks!\n\nEnter your current odometer reading (km) to start tracking mileage:');
    if (base && !isNaN(+base)) {
      await DB.setSetting('odometer', +base);
      await DB.setSetting('odoYear', new Date().getFullYear());
    }
  } else {
    const odoYear = await DB.getSetting('odoYear', new Date().getFullYear());
    if (odoYear < new Date().getFullYear()) {
      const upd = prompt(`It's a new year! Update your odometer reading?\nCurrent: ${(+odo).toLocaleString()} km\n\nEnter new reading (or Cancel to skip):`);
      if (upd && !isNaN(+upd)) {
        await DB.setSetting('odometer', +upd);
        await DB.setSetting('odoYear', new Date().getFullYear());
      }
    }
  }
 
  // Drive client ID nudge
  const cid = await DB.getSetting('gdClientId');
  if (!cid) {
    const shown = await DB.getSetting('gdPromptShown');
    if (!shown) {
      await DB.setSetting('gdPromptShown', true);
      setTimeout(() => toast('Tip: Add your Google Client ID in Settings for cloud backup', 'ok'), 1500);
    }
  }
 
  const lastSync = await DB.getSetting('lastSync');
  if (lastSync) { S.syncStatus = 'ok'; renderDot(); }
 
  // Restore active trip state
  S.activeTrip = await DB.getSetting('activeTrip', null);
 
  renderTab('receipts');
}
 
init();
</script>
